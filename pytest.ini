[pytest]
testpaths = tests
markers =
    unit: fast unit tests
    integration: integration tests
    real_model: tests that can run with real model (use TEST_USE_REAL_MODEL=1)
# Exclude research-only tests from default collection
addopts = -v --ignore=tests/legacy/
    --ignore-glob=tests/unit/test_memory_core*.py
    --ignore-glob=tests/unit/test_neural_memory_imports.py
    --ignore-glob=tests/unit/test_ssm_full.py
    --ignore-glob=tests/unit/test_consolidation.py
    --ignore-glob=tests/unit/test_consolidation_service.py
    --ignore-glob=tests/unit/test_context_summary_store.py
    --ignore-glob=tests/unit/test_candidate_store.py
    --ignore-glob=tests/unit/test_experience_block_helper.py
    --ignore-glob=tests/unit/test_experience_store_new.py
    --ignore-glob=tests/unit/test_experience_blocks.py
    --ignore-glob=tests/unit/test_sleep_queue_store.py
    --ignore-glob=tests/unit/test_ssm_signal_integration.py
    --ignore-glob=tests/integration/test_candidates_pipeline.py
    --ignore-glob=tests/integration/test_grounded_builder_contract.py
    --ignore-glob=tests/unit/test_context_summary_stress.py
filterwarnings =
    ignore::FutureWarning:transformers.utils.hub
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(name)s: %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S
