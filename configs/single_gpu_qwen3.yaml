# Single GPU configuration for Qwen3-8B
# Requires ~16 GB VRAM (bfloat16). Works on a single A100/H100/RTX 4090.

memory_mode: t2

base_model:
  type: qwen3
  model_name: Qwen/Qwen3-8B
  device_map: cuda
  dtype: bfloat16
  temperature: 0.7
  max_new_tokens: 512

# Optional: use a smaller dedicated model for fact extraction
# to keep the main model free for chat generation.
#
# fact_llm:
#   type: openai
#   base_url: http://localhost:8081/v1
#   model_name: Qwen/Qwen3.5-4B-Instruct

rag:
  embedder_enabled: true
  embedder_model: Qwen/Qwen3-Embedding-0.6B
  top_k_fts: 5
  top_k_vector: 5
