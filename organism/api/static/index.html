<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Organism</title>
    <style>
      body {
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          sans-serif;
        max-width: 900px;
        margin: 20px auto;
        padding: 0 10px;
      }
      h1 {
        margin-bottom: 0.5rem;
      }
      #chat {
        border: 1px solid #ccc;
        border-radius: 8px;
        padding: 10px;
        height: 420px;
        overflow-y: auto;
        background: #fafafa;
      }
      .msg {
        margin: 4px 0;
        line-height: 1.4;
      }
      .msg-user b {
        color: #0066cc;
      }
      .msg-assistant b {
        color: #008800;
      }
      textarea {
        width: 100%;
        box-sizing: border-box;
        margin-top: 10px;
        padding: 8px;
        border-radius: 6px;
        border: 1px solid #ccc;
        resize: vertical;
      }
      button {
        margin-top: 6px;
        margin-right: 6px;
        padding: 6px 10px;
        border-radius: 6px;
        border: 1px solid #ccc;
        background: #f0f0f0;
        cursor: pointer;
      }
      button:hover {
        background: #e0e0e0;
      }
    </style>
  </head>
  <body>
    <h1>Organism</h1>
    <p style="color: #666; margin-top: 0">
      Chat with your personal AI. Use <code>/remember &lt;text&gt;</code> to store a fact, <code>/mem</code> to view memory.
    </p>
    <div id="chat"></div>

    <textarea
      id="input"
      rows="3"
      placeholder="Type a message, /remember text — store a fact, /mem — show memory..."
    ></textarea
    ><br />
    <button onclick="send()">Send</button>
    <button onclick="remember()">💾 Remember</button>
    <button onclick="clearChat()">🧹 Clear chat</button>

    <script>
      async function send() {
        const input = document.getElementById("input");
        const msg = input.value.trim();
        if (!msg) return;

        if (msg === "/mem") {
          await showMemories();
          input.value = "";
          return;
        }

        if (msg.startsWith("/remember ")) {
          const text = msg.slice("/remember ".length).trim();
          if (text) {
            await doRemember(text);
          }
          input.value = "";
          return;
        }

        addMessage("You", msg, "user");

        const res = await fetch("/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ message: msg }),
        });

        const data = await res.json();
        addMessage("Organism", data.reply, "assistant");
        input.value = "";
      }

      async function remember() {
        const input = document.getElementById("input");
        const text = input.value.trim();
        if (!text) return;
        await doRemember(text);
      }

      async function doRemember(text) {
        const res = await fetch("/remember", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ text: text, mtype: "note" }),
        });
        const data = await res.json();
        alert("Saved to memory (id=" + data.memory_id + ")");
      }

      async function showMemories() {
        try {
          const res = await fetch("/memories");
          const data = await res.json();

          if (!data || data.length === 0) {
            addMessage("Organism", "No memories yet.", "assistant");
            return;
          }

          let text = "Recent memories:\n";
          for (const m of data) {
            const tags = m.tags ? m.tags : "-";
            text += `- (${m.type}, tags: ${tags}) ${m.content}\n`;
          }
          addMessage("Organism", text, "assistant");
        } catch (e) {
          console.error("Error fetching memories:", e);
          addMessage("Organism", "Could not retrieve memories.", "assistant");
        }
      }

      async function clearChat() {
        const chat = document.getElementById("chat");
        chat.innerHTML = "";
        try {
          await fetch("/clear_chat", { method: "POST" });
        } catch (e) {
          console.error("Error clearing chat:", e);
        }
      }

      function addMessage(author, text, role) {
        const chat = document.getElementById("chat");
        const div = document.createElement("div");
        div.className = "msg " + (role === "user" ? "msg-user" : "msg-assistant");
        div.innerHTML = "<b>" + author + ":</b> " + escapeHtml(text);
        chat.appendChild(div);
        chat.scrollTop = chat.scrollHeight;
      }

      function escapeHtml(unsafe) {
        return unsafe
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#039;");
      }
    </script>
  </body>
</html>
